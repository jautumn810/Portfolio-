kind = "web"
previewPath = "/"
title = "TruckLink"
version = "1.0.0"
id = "artifacts/trucklink"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24534

[services.development]
run = "pnpm --filter @workspace/trucklink run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trucklink", "run", "build" ]
publicDir = "artifacts/trucklink/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24534"
BASE_PATH = "/"
